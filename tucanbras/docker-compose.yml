services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tucan_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # auto-runs *.sql on first start

volumes:
  pgdata:
